<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/font.css">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/layout.css">
</head>

<body>

    <!-- -------------- Checkbox & Radio -------------- -->
    <div class="flex-center">
        <div class="chk-custom">
            <input type="checkbox" id="chk01" name="hobby">
            <label for="chk01">디자인</label>
        </div>
        <div class="chk-custom" style="margin-left: 20px;">
            <input type="checkbox" id="chk02" name="hobby">
            <label for="chk02">퍼블리싱</label>
        </div>
    </div>

    <div class="flex-center" style="margin-top: 20px;">
        <div class="radio-custom">
            <input type="radio" id="ra01" name="gender" checked>
            <label for="ra01">남성</label>
        </div>
        <div class="radio-custom" style="margin-left: 20px;">
            <input type="radio" id="ra02" name="gender">
            <label for="ra02">여성</label>
        </div>
    </div>



    <!-- -------------- Form Elements -------------- -->

    <div class="flex-center">
        <div style="margin-top: 20px; max-width: 400px;">
            <input type="text" class="input-base" placeholder="아이디 입력">

            <select class="select-base" style="margin-top: 10px;">
                <option value="" disabled selected hidden>옵션 선택</option>
                <option value="1">옵션 01</option>
                <option value="2">옵션 02</option>
                <option value="3">옵션 03</option>
            </select>

            <textarea class="textarea-base" style="margin-top: 10px;" placeholder="문의내용 입력"></textarea>

            <div class="flex-between" style="margin-top: 10px;">
                <button type="button" class="btn btn-md btn-outline" style="width: 48%;">취소</button>
                <button type="button" class="btn btn-md btn-main" style="width: 48%;">확인</button>
            </div>
        </div>
    </div>



    <!-- -------------- 더보기 버튼 -------------- -->
    <div class="flex-column" style="gap: 15px; align-items: center; margin-top: 50px;">
        <button type="button" class="btn-more btn-more-main has-arrow">더보기</button>
        <a href="#" class="btn-more btn-more-line">VIEW LIST</a>
        <button type="button" class="btn-more btn-more-gray has-arrow btn-round">MORE</button>
    </div>


    <!-- -------------- 커스텀 셀렉트 -------------- -->
    <div class="flex-center" style="margin-top: 50px;">
        <div class="select-custom">
            <button type="button" class="select-trigger">옵션 선택</button>

            <ul class="select-options">
                <li data-value="1">옵션 01</li>
                <li data-value="2">옵션 02</li>
                <li data-value="3">옵션 03</li>
            </ul>
        </div>
    </div>





    <script src="./js/common.js"></script>
</body>

</html>
